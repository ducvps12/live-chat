services:
  # ─── MongoDB ───
  mongo:
    image: mongo:7
    container_name: nemark_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - nemark_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Application (Next.js + Express + Socket.IO) ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nemark_app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3020:3020"
      - "4020:4020"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - nemark_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4020/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongo_data:
    driver: local

networks:
  nemark_net:
    driver: bridge
